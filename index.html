<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Masuk atau Daftar</title>
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="left-side">
                <div class="logo">facebook</div>
                <h2 class="subtitle">Facebook membantu Anda terhubung dan berbagi dengan orang-orang dalam kehidupan Anda.</h2>
            </div>
            <div class="login-box">
                <form onsubmit="event.preventDefault();">
                    <div class="input-group">
                        <input type="text" placeholder="Email atau Nomor Telepon" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="Kata Sandi" required>
                    </div>
                    <button type="submit" class="btn-login">Masuk</button>
                </form>
                <a href="#" class="forgot-link">Lupa kata sandi?</a>
                <div class="divider"></div>
                <button class="btn-create">Buat Akun Baru</button>
            </div>
        </div>
    </div>
    
    <div class="warning-footer">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
        </svg>
        <span><strong>PERINGATAN:</strong> Halaman ini adalah simulasi edukasi keamanan cyber, perhatikan url sebelum memasukan data sensitive.</span>
    </div>
</body>
</html>
